backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

# Allow editorial workflow (drafts before publishing)
publish_mode: editorial_workflow

collections:

  # ── HOMEPAGE ──
  - name: "homepage"
    label: "Homepage"
    files:
      - label: "Homepage Content"
        name: "homepage"
        file: "data/homepage.json"
        fields:
          - label: "Hero Hook"
            name: "hero_hook"
            widget: "string"
            hint: "The opening line before WHAT NOW?"
          - label: "Hero Transition"
            name: "hero_transition"
            widget: "string"
            hint: "The line after WHAT NOW? (e.g. That's where we come in.)"
          - label: "Hero Statement"
            name: "hero_statement"
            widget: "text"
            hint: "The large bold statement"
          - label: "Location"
            name: "location"
            widget: "string"
          - label: "Focus"
            name: "focus"
            widget: "string"
          - label: "About (paragraph 1)"
            name: "about_p1"
            widget: "text"
          - label: "About (paragraph 2)"
            name: "about_p2"
            widget: "text"
          - label: "Approach Headline"
            name: "approach_headline"
            widget: "string"
          - label: "Approach Body"
            name: "approach_body"
            widget: "text"
          - label: "Contact Email"
            name: "contact_email"
            widget: "string"

  # ── PROJECTS ──
  - name: "projects"
    label: "Projects"
    files:

      - label: "Unapologetic Frequencies"
        name: "frequencies"
        file: "data/projects/frequencies.json"
        fields:
          - label: "Title"
            name: "title"
            widget: "string"
          - label: "Tagline"
            name: "tagline"
            widget: "string"
          - label: "Tags"
            name: "tags"
            widget: "list"
            field: {label: Tag, name: tag, widget: string}
          - label: "Client"
            name: "client"
            widget: "string"
          - label: "Year"
            name: "year"
            widget: "string"
          - label: "Card Cover Image"
            name: "cover_image"
            widget: "image"
          - label: "Hero Video 1"
            name: "hero_video_1"
            widget: "string"
            hint: "Filename e.g. frequencies-hero-01.mp4"
          - label: "Hero Video 2"
            name: "hero_video_2"
            widget: "string"
            hint: "Filename e.g. frequencies-hero-02.mp4"
          - label: "Context"
            name: "context"
            widget: "markdown"
          - label: "Challenge"
            name: "challenge"
            widget: "markdown"
          - label: "Strategic Move"
            name: "strategic_move"
            widget: "markdown"
          - label: "What We Built"
            name: "what_we_built"
            widget: "markdown"
          - label: "Why It Mattered"
            name: "why_it_mattered"
            widget: "markdown"
          - label: "Photos"
            name: "photos"
            widget: "list"
            field: {label: Photo, name: photo, widget: image}

      - label: "ComplexCon Activation"
        name: "complexcon"
        file: "data/projects/complexcon.json"
        fields:
          - label: "Title"
            name: "title"
            widget: "string"
          - label: "Tagline"
            name: "tagline"
            widget: "string"
          - label: "Tags"
            name: "tags"
            widget: "list"
            field: {label: Tag, name: tag, widget: string}
          - label: "Clients"
            name: "clients"
            widget: "list"
            fields:
              - {label: Name, name: name, widget: string}
              - {label: URL, name: url, widget: string}
          - label: "Year"
            name: "year"
            widget: "string"
          - label: "Card Cover Image"
            name: "cover_image"
            widget: "image"
          - label: "Hero Video"
            name: "hero_video"
            widget: "string"
            hint: "Filename e.g. complexcon-hero.mp4"
          - label: "Context"
            name: "context"
