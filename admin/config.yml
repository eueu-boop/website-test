          - label: "Challenge"
            name: "challenge"
            widget: "markdown"
          - label: "Strategic Move"
            name: "strategic_move"
            widget: "markdown"
          - label: "What We Built"
            name: "what_we_built"
            widget: "markdown"
          - label: "Why It Mattered"
            name: "why_it_mattered"
            widget: "markdown"
          - label: "Photos"
            name: "photos"
            widget: "list"
